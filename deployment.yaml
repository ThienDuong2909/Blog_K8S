## Client Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-blog-client
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 5

  # Zero-downtime rolling update:
  # maxSurge: 1     → tạo pod MỚI trước (tạm thời có 2 pods)
  # maxUnavailable: 0 → KHÔNG kill pod cũ cho đến khi pod mới qua readinessProbe
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: devops-blog-client
  template:
    metadata:
      labels:
        app: devops-blog-client
    spec:
      containers:
        - name: devops-blog-client
          # Jenkins CI will automatically update this image tag on each build
          image: thienduong2909/devops-blog-client:86
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            # Internal API URL for server-side calls (sitemap, generateMetadata)
            # Uses K8s service DNS — client pod can reach server pod internally
            - name: INTERNAL_API_URL
              value: "http://devops-blog-server-svc"
            # Canonical site URL for SEO meta tags, sitemap, robots.txt
            - name: NEXT_PUBLIC_SITE_URL
              value: "https://blog.thienduong.info"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Startup probe: cho phép client 60s để khởi động trước khi liveness bật
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 6
            periodSeconds: 10
          # Liveness probe: dùng '/' tạm thời cho đến khi image mới có /api/health
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          # Readiness probe: K8s chỉ route traffic vào pod khi nó sẵn sàng
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
## Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-blog-server
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 5

  # Zero-downtime rolling update:
  # maxSurge: 1     → tạo pod MỚI trước (tạm thời có 2 pods)
  # maxUnavailable: 0 → KHÔNG kill pod cũ cho đến khi pod mới qua readinessProbe
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: devops-blog-server
  template:
    metadata:
      labels:
        app: devops-blog-server
    spec:
      containers:
        - name: devops-blog-server
          # Jenkins CI will automatically update this image tag on each build
          image: thienduong2909/devops-blog-server:69
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: API_PREFIX
              value: "api/v1"
            - name: APP_URL
              value: "https://blog.thienduong.info"
            - name: CORS_ORIGIN
              value: "https://blog.thienduong.info,https://www.blog.thienduong.info"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: SWAGGER_ENABLED
              value: "false"
            - name: JWT_ACCESS_EXPIRES_IN
              value: "15m"
            - name: JWT_REFRESH_EXPIRES_IN
              value: "7d"
            - name: JWT_MFA_CHALLENGE_EXPIRES_IN
              value: "10m"
            - name: SMTP_HOST
              value: "mail.thienduong.info"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_USER
              value: "dailydevops@thienduong.info"
            - name: CONTACT_INBOX
              value: "dailydevops@thienduong.info"
            - name: EMAIL_FROM
              value: "DevOps Daily <dailydevops@thienduong.info>"
            - name: S3_ENDPOINT
              value: "https://vn-fpt.azcloudstorage.com"
            - name: S3_REGION
              value: "auto"
            - name: S3_BUCKET
              value: "dailydevops"
            - name: SENTRY_TRACES_SAMPLE_RATE
              value: "0"
            - name: TRUST_PROXY
              value: "1"
            - name: LOG_FORMAT
              value: "pretty"
            - name: LOG_SKIP_HEALTH
              value: "true"
            - name: LOG_ONLY_API
              value: "true"
            # Sensitive env vars loaded from K8s Secret (devops-blog-server-secret)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: DATABASE_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: JWT_REFRESH_SECRET
            - name: JWT_MFA_SECRET
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: JWT_MFA_SECRET
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: SMTP_PASS
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: devops-blog-server-secret
                  key: SENTRY_DSN
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          # Startup probe: cho server 100s để khởi động (Prisma + DB connection)
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 10
            periodSeconds: 10
          # Liveness probe: K8s sẽ restart pod nếu /health không trả về 200
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          # Readiness probe: K8s chỉ route traffic vào pod khi DB đã kết nối xong
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
