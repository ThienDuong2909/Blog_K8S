# ============================================================
# Loki 3.x Helm Values — Single Binary mode cho K3s
# Tương thích với Grafana 12 (kube-prometheus-stack)
#
# Cài đặt:
#   helm install loki grafana/loki \
#     --namespace monitoring \
#     --values loki3-values.yaml
# ============================================================

# Single Binary mode — tất cả components trong 1 pod (phù hợp VPS nhỏ)
deploymentMode: SingleBinary

loki:
  auth_enabled: false # Không cần auth trong cluster nội bộ

  commonConfig:
    replication_factor: 1 # 1 node → replicas = 1

  # Lưu logs vào local filesystem (PVC)
  storage:
    type: filesystem

  # Schema v13 — mới nhất cho Loki 3.x
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # Giới hạn ingestion (phù hợp VPS nhỏ)
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h # 7 ngày
    max_cache_freshness_per_query: 10m
    retention_period: 720h # Giữ 30 ngày

# ── Tắt cache (memcached) — không cần cho VPS nhỏ ───────────
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# ── Single Binary pod config ──────────────────────────────────
singleBinary:
  replicas: 1

  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path # K3s default storage class

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

# ── Tắt các components không dùng trong Single Binary mode ──
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# ── Không cài Grafana mới (đã có) ───────────────────────────
test:
  enabled: false
lokiCanary:
  enabled: false
